# Weekly check for upstream drift in the native C libraries each port
# links to. Different model from rosetta-image-hash's upstream-tracker:
# the deps here are apt packages (libjpeg-turbo, libwebp, libtiff,
# libheif, libde265), so we don't compare PyPI version strings — we
# install the latest apt packages and re-run the cross-port-diff
# harness. If any port's live output diverges from the frozen
# spec/decoded/*.bin goldens, that means a native lib version
# bump changed pixel output and the goldens are stale.
#
# Trigger: weekly + manual.
name: upstream-tracker

on:
  schedule:
    - cron: "0 6 * * 1"  # Mondays 06:00 UTC
  workflow_dispatch:

jobs:
  check-native-libs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update apt + install latest native libs
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libjpeg-turbo8-dev libturbojpeg libturbojpeg0-dev libturbojpeg-java \
            libwebp-dev libsharpyuv-dev \
            libtiff-dev \
            libheif-dev libheif-plugin-libde265 libde265-dev libde265-0 \
            pkg-config

      - name: Snapshot installed versions
        run: |
          echo "Installed native lib versions:"
          dpkg -l libjpeg-turbo8 libturbojpeg0 libwebp7 libtiff6 libheif1 libde265-0 \
            | awk '/^ii/ {printf "  %s %s\n", $2, $3}'

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Go 1.22
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Swift 5.9
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "5.9"

      - name: Set up Python (for PIL CLI orchestrator)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PIL
        run: pip install Pillow

      - name: Build all 5 port CLIs
        run: |
          ( cd rust/rosetta-image-decode && cargo build --release --example decode-cli )
          ( cd go/imagedecode && go build -o ../../tools/cross-port-diff/decode-go ./cmd/decode-cli )
          ( cd java/rosetta-image-decode && mvn -B -ntp -DskipTests -Dmaven.compiler.source=17 -Dmaven.compiler.target=17 package )
          ( cd js/rosetta-image-decode && npm install && npm run build )
          ( cd swift/RosettaImageDecode && swift build --product DecodeCLI -c release )

      - name: Cross-port regression vs frozen goldens
        run: |
          tools/cross-port-diff/diff_all.py --vs-goldens --regression
