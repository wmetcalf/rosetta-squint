# Build configuration for rosetta-image-decode
# Use pillow-heif's bundled libheif 1.21.2 to match golden pixel values.
# The goldens were generated with pillow-heif which links libheif 1.21.2.
# System libheif 1.17.6 produces ±1 pixel differences due to YCbCr→RGB
# conversion algorithm differences between the two versions.
[env]
PKG_CONFIG_PATH = "/home/coz/rosetta-image-decode/rust/pkgconfig"

[target.x86_64-unknown-linux-gnu]
rustflags = [
    "-L/home/coz/.local/lib/python3.12/site-packages/pillow_heif.libs",
    "-C", "link-arg=-Wl,-rpath,/home/coz/.local/lib/python3.12/site-packages/pillow_heif.libs",
]
