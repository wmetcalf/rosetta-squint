name: decode-ci

on:
  pull_request:
    paths:
      - "decode/**"
      - ".github/workflows/decode-ci.yml"
  push:
    branches: [main]
    paths:
      - "decode/**"
      - ".github/workflows/decode-ci.yml"
  schedule:
    # Weekly Monday 09:00 UTC — re-runs dep-audit + govulncheck so newly-published
    # CVEs against pinned versions surface without waiting for a PR.
    - cron: '0 9 * * 1'

jobs:
  spec-drift:
    name: spec drift check
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: decode/spec
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: decode/spec/requirements.txt
      - name: Install pinned dependencies
        run: pip install -r requirements.txt
      - name: Check regenerate.py is idempotent
        run: python regenerate.py --check

  spec-only:
    name: spec consistency
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: decode/spec
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: decode/spec/requirements.txt
      - name: Install pinned dependencies
        run: pip install -r requirements.txt
      - name: Run consistency check
        run: python consistency.py

  port-tests:
    name: Port tests (${{ matrix.port }})
    runs-on: ubuntu-22.04
    needs: [spec-drift, spec-only]
    strategy:
      fail-fast: false
      matrix:
        port: [java, go, rust, js, swift]
    steps:
      - uses: actions/checkout@v4

      # Java
      - name: Set up Java 17
        if: matrix.port == 'java'
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      # libjpeg-turbo for Java/Go/Swift JPEG decoders
      - name: Install libjpeg-turbo for Java
        if: matrix.port == 'java'
        run: sudo apt-get update -qq && sudo apt-get install -y libturbojpeg libturbojpeg0-dev libturbojpeg-java libwebp-dev libsharpyuv-dev libtiff-dev libheif-dev libheif-plugin-libde265 libde265-dev libde265-0 pkg-config

      - name: Java — mvn test
        if: matrix.port == 'java'
        run: cd decode/java/rosetta-image-decode && mvn -B -ntp test

      # Go
      - name: Set up Go 1.22
        if: matrix.port == 'go'
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: decode/go/imagedecode/go.mod
      - name: Install libjpeg-turbo for Go
        if: matrix.port == 'go'
        run: sudo apt-get update -qq && sudo apt-get install -y libjpeg-turbo8-dev libturbojpeg libturbojpeg0-dev libwebp-dev libsharpyuv-dev libtiff-dev libheif-dev libheif-plugin-libde265 libde265-dev libde265-0 pkg-config

      - name: Go — go test
        if: matrix.port == 'go'
        run: cd decode/go/imagedecode && go test -count=1 ./...

      # Rust
      - name: Set up Rust stable
        if: matrix.port == 'rust'
        uses: dtolnay/rust-toolchain@stable
      - name: Install libheif for Rust
        if: matrix.port == 'rust'
        run: sudo apt-get update -qq && sudo apt-get install -y libheif-dev libheif-plugin-libde265 libde265-dev libde265-0 pkg-config
      - name: Cache cargo
        if: matrix.port == 'rust'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            decode/rust/rosetta-image-decode/target
          key: cargo-${{ runner.os }}-${{ hashFiles('decode/rust/rosetta-image-decode/Cargo.lock') }}
      - name: Rust — cargo test
        if: matrix.port == 'rust'
        run: cd decode/rust/rosetta-image-decode && cargo test --no-fail-fast

      # JS
      - name: Set up Node 20
        if: matrix.port == 'js'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: decode/js/rosetta-image-decode/package-lock.json
      - name: JS — npm ci + test
        if: matrix.port == 'js'
        run: cd decode/js/rosetta-image-decode && npm ci && npm test

      # Swift
      - name: Set up Swift 5.9
        if: matrix.port == 'swift'
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: '5.9'
      - name: Install libjpeg-turbo for Swift
        if: matrix.port == 'swift'
        run: sudo apt-get update -qq && sudo apt-get install -y libturbojpeg libturbojpeg0-dev libwebp-dev libsharpyuv-dev libtiff-dev libheif-dev libheif-plugin-libde265 libde265-dev libde265-0 pkg-config

      - name: Swift — swift test
        if: matrix.port == 'swift'
        run: cd decode/swift/RosettaImageDecode && swift test

  dep-audit:
    # Per-ecosystem vulnerability scan. Runs on PR/push and weekly so
    # newly-published CVEs against pinned versions surface without code
    # changes. Independent of port-tests: advisories fail this job but do
    # not block functional CI.
    name: dep-audit (${{ matrix.ecosystem }})
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        ecosystem: [rust, js, python, go]
    steps:
      - uses: actions/checkout@v4

      # Rust — cargo audit (RustSec advisory DB)
      - name: Set up Rust stable
        if: matrix.ecosystem == 'rust'
        uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        if: matrix.ecosystem == 'rust'
        run: cargo install --locked cargo-audit
      - name: cargo audit (decode crate)
        if: matrix.ecosystem == 'rust'
        run: cd decode/rust/rosetta-image-decode && cargo audit --deny warnings

      # JS — npm audit at high severity
      - name: Set up Node 20
        if: matrix.ecosystem == 'js'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: decode/js/rosetta-image-decode/package-lock.json
      - name: npm audit (decode JS)
        if: matrix.ecosystem == 'js'
        run: cd decode/js/rosetta-image-decode && npm ci && npm audit --audit-level=high

      # Python — pip-audit on spec tooling deps
      - name: Set up Python 3.11
        if: matrix.ecosystem == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install pip-audit
        if: matrix.ecosystem == 'python'
        run: python -m pip install --upgrade pip pip-audit
      - name: pip-audit (spec deps)
        if: matrix.ecosystem == 'python'
        run: pip-audit -r spec/requirements.txt

      # Go — govulncheck (Go vulnerability database; covers stdlib + module deps).
      # Use a recent stable Go toolchain so stdlib CVEs fixed in patch releases
      # don't false-positive.
      - name: Set up Go stable
        if: matrix.ecosystem == 'go'
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache-dependency-path: decode/go/imagedecode/go.mod
      - name: Install govulncheck
        if: matrix.ecosystem == 'go'
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: govulncheck (decode Go module)
        if: matrix.ecosystem == 'go'
        run: cd decode/go/imagedecode && govulncheck ./...

  lint:
    # Per-ecosystem static analysis. Catches lint/type-check regressions
    # without running the test matrix.
    name: lint (${{ matrix.port }})
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        port: [rust, go, js, swift]
    steps:
      - uses: actions/checkout@v4

      # Rust — clippy with warnings treated as errors.
      - name: Set up Rust stable
        if: matrix.port == 'rust'
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Install libheif (for clippy-via-build)
        if: matrix.port == 'rust'
        run: sudo apt-get update -qq && sudo apt-get install -y libheif-dev libheif-plugin-libde265 libde265-dev libde265-0 pkg-config
      - name: Cache cargo (lint)
        if: matrix.port == 'rust'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            decode/rust/rosetta-image-decode/target
          key: cargo-lint-${{ runner.os }}-${{ hashFiles('decode/rust/rosetta-image-decode/Cargo.lock') }}
      - name: cargo clippy
        if: matrix.port == 'rust'
        run: cd decode/rust/rosetta-image-decode && cargo clippy --all-targets --all-features -- -D warnings

      # Go — golangci-lint via the official action.
      - name: Set up Go 1.22
        if: matrix.port == 'go'
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: decode/go/imagedecode/go.mod
      - name: Install libs (golangci needs to compile cgo packages)
        if: matrix.port == 'go'
        run: sudo apt-get update -qq && sudo apt-get install -y libjpeg-turbo8-dev libturbojpeg libturbojpeg0-dev libwebp-dev libsharpyuv-dev libtiff-dev libheif-dev libheif-plugin-libde265 libde265-dev libde265-0 pkg-config
      - name: golangci-lint
        if: matrix.port == 'go'
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: decode/go/imagedecode

      # JS/TS — tsc --noEmit.
      - name: Set up Node 20
        if: matrix.port == 'js'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: decode/js/rosetta-image-decode/package-lock.json
      - name: tsc --noEmit
        if: matrix.port == 'js'
        run: |
          cd decode/js/rosetta-image-decode
          npm ci
          if npm run | grep -qE '^  (typecheck|lint)$'; then
            npm run typecheck 2>/dev/null || npm run lint 2>/dev/null || npx tsc --noEmit
          else
            npx tsc --noEmit
          fi

      # Swift — build is the type-check; swift-format lint best-effort.
      - name: Set up Swift 5.9
        if: matrix.port == 'swift'
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: '5.9'
      - name: Install libjpeg-turbo for Swift
        if: matrix.port == 'swift'
        run: sudo apt-get update -qq && sudo apt-get install -y libturbojpeg libturbojpeg0-dev libwebp-dev libsharpyuv-dev libtiff-dev libheif-dev libheif-plugin-libde265 libde265-dev libde265-0 pkg-config
      - name: swift build (type-check)
        if: matrix.port == 'swift'
        run: cd decode/swift/RosettaImageDecode && swift build
      - name: swift-format lint (best-effort)
        if: matrix.port == 'swift'
        continue-on-error: true
        run: |
          if command -v swift-format >/dev/null 2>&1; then
            swift-format lint --recursive swift/RosettaImageDecode/Sources
          else
            echo "swift-format not available on this image; skipping"
          fi

  macos-tests:
    # macOS-arm64 (macos-14) dry-run for cross-platform-claim verification.
    # Runs only on main pushes + weekly cron to keep CI minutes bounded.
    name: macos-arm64 (${{ matrix.port }})
    runs-on: macos-14
    if: github.event_name == 'push' || github.event_name == 'schedule'
    strategy:
      fail-fast: false
      matrix:
        port: [rust, go, java, js, swift]
    env:
      # Homebrew on Apple Silicon installs under /opt/homebrew. The Java
      # cross-port harness already probes these env vars.
      TURBOJPEG_LIB_PATH: /opt/homebrew/opt/jpeg-turbo/lib
      TURBOJPEG_JAR_PATH: /opt/homebrew/share/java/turbojpeg.jar
    steps:
      - uses: actions/checkout@v4

      - name: Install system libs (brew)
        if: matrix.port != 'rust' && matrix.port != 'js'
        run: brew install libjpeg-turbo libwebp libheif libde265 pkg-config

      # Rust
      - name: Set up Rust stable
        if: matrix.port == 'rust'
        uses: dtolnay/rust-toolchain@stable
      - name: Install libheif (Rust)
        if: matrix.port == 'rust'
        run: brew install libheif libde265 pkg-config
      - name: Rust — cargo test
        if: matrix.port == 'rust'
        run: cd decode/rust/rosetta-image-decode && cargo test --no-fail-fast

      # Go
      - name: Set up Go 1.22
        if: matrix.port == 'go'
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: decode/go/imagedecode/go.mod
      - name: Go — go test
        if: matrix.port == 'go'
        run: cd decode/go/imagedecode && go test -count=1 ./...

      # Java — JNA wrapper for libwebp may need a path adjustment on macOS;
      # marked continue-on-error to surface gaps without permanently red CI.
      - name: Set up Java 17
        if: matrix.port == 'java'
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Java — mvn test
        if: matrix.port == 'java'
        continue-on-error: true
        run: |
          cd decode/java/rosetta-image-decode
          ls -la /opt/homebrew/share/java/ 2>/dev/null || echo "(no homebrew java dir)"
          ls -la /opt/homebrew/opt/jpeg-turbo/lib/ 2>/dev/null || echo "(no jpeg-turbo lib dir)"
          ls -la /opt/homebrew/opt/webp/lib/ 2>/dev/null || echo "(no webp lib dir)"
          # Put the homebrew libs on jna.library.path so the JNA-wrapped
          # decoders find them at the right architecture.
          mvn -B -ntp \
            -Djava.library.path="$TURBOJPEG_LIB_PATH:/opt/homebrew/opt/webp/lib:/opt/homebrew/opt/libheif/lib" \
            -Djna.library.path="$TURBOJPEG_LIB_PATH:/opt/homebrew/opt/webp/lib:/opt/homebrew/opt/libheif/lib" \
            test

      # JS
      - name: Set up Node 20
        if: matrix.port == 'js'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: decode/js/rosetta-image-decode/package-lock.json
      - name: JS — npm ci + test
        if: matrix.port == 'js'
        run: cd decode/js/rosetta-image-decode && npm ci && npm test

      # Swift — native
      - name: Set up Swift 5.9
        if: matrix.port == 'swift'
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: '5.9'
      - name: Swift — swift test
        if: matrix.port == 'swift'
        run: cd decode/swift/RosettaImageDecode && swift test
