# golangci-lint v2 config for rosetta-squint (Go port).
# Security/correctness-focused; matches the policy in sibling halves.

version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - govet
    - staticcheck
    - errcheck
    - gosec
    - ineffassign
    - unused
  settings:
    gosec:
      # G104 (unchecked errors): errcheck already covers this and is less noisy.
      # G115 (integer overflow conversion): pervasive after bounds-checks.
      # G304 (file paths via variables): unavoidable in a library that takes
      # caller-supplied paths.
      # G703 (path traversal): same justification as G304.
      excludes:
        - G104
        - G115
        - G304
        - G703
    errcheck:
      check-type-assertions: false
      check-blank: false
    staticcheck:
      # Disable stylistic-only checks (naming conventions / comment format /
      # De Morgan suggestion / tagged switch) that don't affect correctness.
      checks:
        - all
        - -QF1001
        - -QF1003
        - -ST1000
        - -ST1003
        - -ST1020
        - -ST1022
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gosec
          - errcheck

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
