# golangci-lint v2 config for rosetta-squint (Go port).
# Security/correctness-focused; matches the policy in sibling halves.

version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - govet
    - staticcheck
    - errcheck
    - gosec
    - ineffassign
    - unused
  settings:
    gosec:
      excludes:
        - G104
        - G304
    errcheck:
      check-type-assertions: false
      check-blank: false
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gosec
          - errcheck

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
