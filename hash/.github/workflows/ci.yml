name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  spec-drift:
    name: spec drift check
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: spec
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: spec/requirements.txt
      - name: Install pinned dependencies
        run: pip install -r requirements.txt
      - name: Check regenerate.py is idempotent
        run: python regenerate.py --check
      - name: Check gen_unit_cases.py is idempotent
        run: python gen_unit_cases.py --check

  spec-only:
    name: spec consistency
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: spec
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: spec/requirements.txt
      - name: Install pinned dependencies
        run: pip install -r requirements.txt
      - name: Run consistency check
        run: python consistency.py

  port-tests:
    name: Port tests (${{ matrix.port }})
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        port: [java]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java 17
        if: matrix.port == 'java'
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Java — mvn test
        if: matrix.port == 'java'
        run: cd java && mvn -B -ntp test
