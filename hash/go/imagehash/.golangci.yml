# golangci-lint v2 config for rosetta-squint-hash (Go port).
#
# Security/correctness focus per the CI lint job. We deliberately omit the
# noisy stylistic linters (gofmt-as-a-lint, nlreturn, lll, varnamelen, etc.)
# because the codebase is FFI-heavy and many idioms are upstream-driven.

version: "2"

run:
  timeout: 5m
  # Allow the cgo packages we depend on (turbojpeg / heif via decode) to be
  # analyzed if present; otherwise tests for pure-Go packages still pass.
  build-tags: []

linters:
  default: none
  enable:
    - govet
    - staticcheck
    - errcheck
    - gosec
    - ineffassign
    - unused
  settings:
    gosec:
      # G104 (unchecked errors): errcheck already covers this and is less noisy.
      # G115 (integer overflow conversion): pervasive in image/hash code where
      # we bounds-check first and then cast — gosec can't see prior checks.
      # G304 (file paths via variables): unavoidable in a library that takes
      # caller-supplied paths.
      # G703 (path traversal): same justification as G304.
      excludes:
        - G104
        - G115
        - G304
        - G703
    errcheck:
      check-type-assertions: false
      check-blank: false
    staticcheck:
      # Disable stylistic-only checks (naming conventions / comment format /
      # De Morgan suggestion / tagged switch) that don't affect correctness.
      # QF1001: De Morgan's law suggestion
      # QF1003: use tagged switch instead of if-else
      # ST1000: package comment requirement
      # ST1003: identifier naming (Db4 vs DB4)
      # ST1020: exported-function comment format
      # ST1022: exported-var comment format
      checks:
        - all
        - -QF1001
        - -QF1003
        - -ST1000
        - -ST1003
        - -ST1020
        - -ST1022
  # Don't fail on test files for gosec.
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gosec
          - errcheck

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
